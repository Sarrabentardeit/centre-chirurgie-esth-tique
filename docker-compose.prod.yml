services:
  db:
    image: postgres:16-alpine
    container_name: centre_est_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-centre_est}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-centre_est}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: centre_est_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-centre_est}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      UPLOAD_DIR: uploads
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB:-10}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      API_BASE_URL: ${API_BASE_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: centre_est_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-traefik}"
      - "traefik.http.routers.centre-est.rule=Host(`chennoufi.nav.ovh`)"
      - "traefik.http.routers.centre-est.entrypoints=websecure"
      - "traefik.http.routers.centre-est.tls=true"
      - "traefik.http.routers.centre-est.tls.certresolver=letsencrypt"
      - "traefik.http.routers.centre-est-http.rule=Host(`chennoufi.nav.ovh`)"
      - "traefik.http.routers.centre-est-http.entrypoints=web"
      - "traefik.http.routers.centre-est-http.middlewares=centre-est-redirect-https"
      - "traefik.http.middlewares.centre-est-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.services.centre-est.loadbalancer.server.port=80"
    networks:
      - default
      - traefik

volumes:
  postgres_data:
  uploads_data:

networks:
  traefik:
    external: true
    name: ${TRAEFIK_DOCKER_NETWORK:-traefik}
