server {
  listen 80;
  server_name _;

  # Photos téléphone souvent > 1 Mo (défaut nginx) → sinon 413 HTML
  client_max_body_size 25m;

  root /usr/share/nginx/html;
  index index.html;

  # Empêche le cache agressif des en-têtes hérités
  etag off;
  if_modified_since off;

  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    client_max_body_size 25m;
  }

  location /uploads/ {
    proxy_pass http://backend:4000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    client_max_body_size 25m;
  }

  # JS/CSS hashés Vite → cache long (le nom de fichier change à chaque build)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Version build — jamais en cache (détection nouvelle version)
  location = /version.json {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    try_files $uri =404;
  }

  # index.html — jamais en cache (pointe vers les nouveaux assets)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /manifest.json {
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
  }

  location / {
    # SPA : chaque navigation doit pouvoir récupérer le dernier index.html
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
